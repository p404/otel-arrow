# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: pdata

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Register profiles as a routable OTAP signal (`SignalType::Profiles`, `OtapArrowRecords::Profiles`) across the pdata batch store, transport-optimized encoding, batching, and reindex/concatenate machinery.

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [2303]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Profiles now flow through the same generic OtapBatchStore/reindex/concatenate machinery as
  logs, metrics, and traces, and are routable end-to-end through the durable buffer processor,
  signal-type router, and other signal-agnostic pipeline stages. OTAP profiles <-> OTLP proto
  encode/decode, batch splitting by item count, and signal-specific processors (attributes
  "signal" domain, filter, query-engine assign/conditional) are not implemented yet and fail
  with clear typed errors rather than panicking or silently dropping data; these land in
  follow-up changes.
