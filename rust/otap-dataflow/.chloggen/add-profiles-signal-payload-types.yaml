note: Register the OTAP payload types and Arrow schemas for the profiles signal (PROFILES, SAMPLE, and the interned MAPPING/LOCATION/FUNCTION/LINK/STRING/ATTRIBUTE lookup tables) — the first step toward first-class OTel Arrow support for profiles.

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [2303]

# (Optional) One or more lines of additional information to render under the primary note.
