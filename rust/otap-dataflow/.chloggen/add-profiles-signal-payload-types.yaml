subtext: |
  Adds ArrowPayloadType 50-58 and their static Arrow schemas in the pdata crate, plus the
  payload-index and raw-store wiring. This is registry + schema scaffolding only; the encode,
  decode, and OtapArrowRecords integration follow in later changes.
